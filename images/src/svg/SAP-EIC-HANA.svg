<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">

<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
	<style>
		.cluster {
			fill: #192072;
		}
		.rancherCluster {
			fill: #192072;
		}
		.control {
			fill: #30BA78;
		}
		.worker {
			fill: #FE7C3F;
		}
		.rancherNode {
			fill: #979B5B;
		}
		text {
			font-weight: bold;
		}
		.tCluster {
			font-size: 26pt;
			fill: white;
			text-anchor: middle;
			dominant-baseline: middle;
		}
		.tClusterNode {
			font-size: 18pt;hauck Buggy Sport
			fill: black;
			text-anchor: middle;
			dominant-baseline: middle;
		}
        .hana {
            fill: #dfd007;
        }
        .tHana {
            font-size: 36pt;
			fill: white;
			text-anchor: middle;
			dominant-baseline: middle;
        }
	</style>

	<!-- Draws the "Rancher Cluster" -->
	<rect class="rancherCluster" x="600" y="0" width="600" height="250"/>
		<text class="tCluster" x="600" y="25">
        	<tspan x="900" dy="1.2em">Rancher Cluster</tspan>
        </text>

		<!-- Draws the Rancher Nodes -->
  		<rect class="rancherNode test" x="637.5" y="75" width="125" height="100" rx="15" ry="15"/>
    		<text class="tClusterNode" x="650" y="80">
           		<tspan x="700" dy="1.2em">Control</tspan>
            	<tspan x="700" dy="1.2em">Plane +</tspan>
				<tspan x="700" dy="1.2em">Worker</tspan>
            </text>
		<rect class="rancherNode" x="837.5" y="75" width="125" height="100" rx="15" ry="15"/>
    		<text class="tClusterNode" x="825" y="80">
           		<tspan x="897.5" dy="1.2em">Control</tspan>
            	<tspan x="897.5" dy="1.2em">Plane +</tspan>
				<tspan x="897.5" dy="1.2em">Worker</tspan>
        	</text>
		<rect class="rancherNode" x="1037.5" y="75" width="125" height="100" rx="15" ry="15"/>
    		<text class="tClusterNode" x="1050" y="80">
           		<tspan x="1100" dy="1.2em">Control</tspan>
            	<tspan x="1100" dy="1.2em">Plane +</tspan>
				<tspan x="1100" dy="1.2em">Worker</tspan>
        	</text>

	<!-- Creates the labels "Creates/Manages" -->
	<text x="300" y="100" font-size="20" fill="black" font-weight="bold"> Creates / Manages </text>
	
	<!-- Draws the "Production Cluster" -->
	<rect class="cluster" x="0" y="300" width="600" height="500"/>
    	<text class="tCluster" x="300" y="500">
        	<tspan x="300" dy="1.2em">Production</tspan>
            <tspan x="300" dy="1.2em">Cluster</tspan>
        </text>

		<!-- Draws the Conrol Planes -->
  		<rect class="control" x="37.5" y="350" width="125" height="100" rx="15" ry="15"/>
    		<text class="tClusterNode" x="100" y="375">
           		<tspan x="100" dy="1.2em">Control</tspan>
            	<tspan x="100" dy="1.2em">Plane</tspan>
            </text>

        <rect class="control" x="237.5" y="350" width="125" height="100" rx="15" ry="15"/>
    		<text class="tClusterNode" x="300" y="375">
           		<tspan x="300" dy="1.2em">Control</tspan>
            	<tspan x="300" dy="1.2em">Plane</tspan>
            </text>
        <rect class="control" x="437.5" y="350" width="125" height="100" rx="15" ry="15"/>
    		<text class="tClusterNode" x="500" y="375">
            	<tspan x="500" dy="1.2em">Control</tspan>
            	<tspan x="500" dy="1.2em">Plane</tspan>
            </text>

		<!-- Draws the Worker Nodes -->
  		<rect class="worker" x="37.5" y="650" width="125" height="100"  rx="15" ry="15"/>
        	<text class="tClusterNode" x="100" y="700">Worker</text>
  		<rect class="worker" x="237.5" y="650" width="125" height="100"  rx="15" ry="15"/>
        	<text class="tClusterNode" x="300" y="700">Worker</text>
  		<rect class="worker" x="437.5" y="650" width="125" height="100"  rx="15" ry="15"/>
        	<text class="tClusterNode" x="500" y="700">Worker</text>


    <rect class="hana" x="900" y="300" width="600" height="500"/>
        		<text class="tHana" x="900" y="400">
           		<tspan x="1200" dy="1.2em">HANA</tspan>
        	</text>
        
  <g transform="translate(1075, 500) scale(2.5)">
    <path d="M20 25C20 19.4772 33.4315 15 50 15C66.5685 15 80 19.4772 80 25V75C80 80.5228 66.5685 85 50 85C33.4315 85 20 80.5228 20 75V25Z" 
        fill="#FFFFFF" 
        stroke="#008FD3" 
        stroke-width="5" 
        stroke-linejoin="round"/>
    <path d="M20 45C20 50.5228 33.4315 55 50 55C66.5685 55 80 50.5228 80 45" 
        stroke="#008FD3" 
        stroke-width="5" 
        fill="none"/>
    <ellipse cx="50" cy="25" rx="30" ry="10" 
           fill="#FFFFFF" 
           stroke="#008FD3" 
           stroke-width="2"/>
    <path d="M55 35L40 55H52L45 75L60 55H48L55 35Z" 
        fill="#F2AD00" 
        stroke="#000000" 
        stroke-width="1"/>
  </g>


<!-- Draws the arrows-->
	<!-- Definiere einen Marker für die Pfeilspitze -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
  
  <!-- Draw left horizontal line -->
  <line x1="300" y1="125" x2="600" y2="125" stroke="black" stroke-width="2"/>
  
  <!-- Draw left vertical line -->
  <line x1="300" y1="125" x2="300" y2="275" stroke="black" stroke-width="2" 
        marker-end="url(#arrowhead)"/>

   <line x1="565" y1="700" x2="855" y2="700" stroke="black" stroke-width="5" marker-end="url(#arrowhead)"/>
</svg>


